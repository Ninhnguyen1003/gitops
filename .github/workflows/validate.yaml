name: validate

on:
  pull_request:
    paths:
      - "k8s/**" 

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kubeconform
        run: |
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz && sudo mv kubeconform /usr/local/bin/

      - name: Run Validate Manifests
        run: kubeconform -strict -summary k8s/ # Chỉ kiểm tra cú pháp, CẤM tuyệt đối không kubectl apply ở đây