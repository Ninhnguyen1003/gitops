apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        # Tắt Alertmanager cho nhẹ máy
        alertmanager:
          enabled: false
        
        # Tắt Grafana (chúng ta sẽ xem metric trực tiếp bằng giao diện Prometheus ở port 9090)
        grafana:
          enabled: false

        # Giảm lượng CPU/RAM mà Prometheus đòi hỏi
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            resources:
              requests:
                memory: 400Mi
                cpu: 200m
              limits:
                memory: 750Mi
                cpu: 500m
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true