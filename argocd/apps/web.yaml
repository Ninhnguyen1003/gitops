apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: web
  namespace: argocd
spec:
  project: default # 🟢 ĐÂY LÀ DÒNG BỊ THIẾU (Bắt buộc phải có để tránh lỗi 'spec.project: Required value')
  source:
    repoURL: https://github.com/Ninhnguyen1003/gitops.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true