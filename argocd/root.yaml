apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ninhnguyen1003/gitops.git # 🟢 Link repo gitops của bạn
    targetRevision: main
    path: argocd/apps # 🟢 Thư mục chứa các file Application con (nơi đang có file web.yaml của bạn)
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd # Root App quản lý các App khác nên nằm ở namespace argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true