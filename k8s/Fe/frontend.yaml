apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: demo
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="vi">
    <head>
      <meta charset="UTF-8" />
      <title>Frontend Demo</title>
      <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
        button { padding: 10px 16px; font-size: 16px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 16px; border-radius: 8px; }
      </style>
    </head>
    <body>
      <h1>Frontend Kubernetes</h1>
      <p>Nhấn nút để gọi backend service.</p>
      <button id="call">Gọi Backend</button>
      <pre id="result">Kết quả sẽ hiển thị tại đây.</pre>
      <script>
        document.getElementById('call').addEventListener('click', async () => {
          const result = document.getElementById('result');
          result.textContent = 'Đang gọi backend...';
          try {
            const response = await fetch('/api/hello');
            const data = await response.json();
            result.textContent = JSON.stringify(data, null, 2);
          } catch (err) {
            result.textContent = 'Lỗi: ' + err.message;
          }
        });
      </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: frontend-content
              mountPath: /usr/share/nginx/html
      volumes:
        - name: frontend-content
          configMap:
            name: frontend-html
            items:
              - key: index.html
                path: index.html
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: demo
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: http
