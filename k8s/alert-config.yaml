apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: email-alert-config
  namespace: demo          
spec:
  route:
    groupBy: ['alertname', 'app', 'namespace']
    groupWait: 10s
    groupInterval: 10s
    repeatInterval: 1h
    receiver: 'Gmail-Receiver'
  receivers:
  - name: 'Gmail-Receiver'
    emailConfigs:
    - to: 'ninhnguyen130604@gmail.com' 
      from: 'ninhnguyen130604@gmail.com'       
      smarthost: 'smtp.gmail.com:587'
      authUsername: 'ninhnguyen130604@gmail.com' 
      authPassword:
        name: alertmanager-smtp-secret 
        key: password                            
      requireTLS: true