apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: w9-api:2 
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        env:
        - name: ERROR_RATE
          value: "1"       
        - name: VERSION
          value: "v2"      
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
  strategy:
    canary:
      analysis:
        templates:
        - templateName: api-success-rate
        args:
        - name: service-name
          value: api
      steps:
      - setWeight: 25
      - pause: { duration: 1m }   
      - setWeight: 50
      - pause: { duration: 1m }   
      - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: api