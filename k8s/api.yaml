apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  replicas: 2 # Giữ 2 Pod cho nhẹ máy 8GB
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: w9-api:5 
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: ERROR_RATE
          value: "0"
        - name: VERSION
          value: "v5"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
  strategy:
    canary:
      analysis:
        templates:
        - templateName: api-success-rate
        args:
        - name: service-name
          value: api
      steps:
      - setWeight: 25
      - pause: { duration: 20s } # Chạy thử nghiệm 25% traffic trong 20s để Analysis quét
      - setWeight: 50
      - pause: { duration: 20s } # Tăng lên 50% traffic và tiếp tục quét
      - setWeight: 100
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
spec:
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  selector:
    app: api